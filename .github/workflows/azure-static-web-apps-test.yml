name: Azure Static Web Apps Test

on:
  push:
    branches: [develop]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: azure-static-web-apps-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars['AZURE_TEST_SITE_URL'] || '' }}
      NEXT_PUBLIC_GA_ID: ${{ vars['AZURE_TEST_GA_ID'] || '' }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ vars['AZURE_TEST_SENTRY_DSN'] || vars['NEXT_PUBLIC_SENTRY_DSN'] || '' }}
      SENTRY_ENVIRONMENT: test
      SENTRY_ORG: ${{ vars['SENTRY_ORG'] || 'gabriel-db' }}
      SENTRY_PROJECT: ${{ vars['SENTRY_PROJECT'] || 'javascript-nextjs' }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      AZURE_DEPLOY_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TEST }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build static export for Azure
        run: npm run build:azure

      - name: Skip deploy when token is missing
        if: env.AZURE_DEPLOY_TOKEN == ''
        run: echo "::warning::AZURE_STATIC_WEB_APPS_API_TOKEN_TEST is not set. Skipping deployment."

      - name: Deploy test environment to Azure Static Web Apps
        if: env.AZURE_DEPLOY_TOKEN != ''
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: out
          output_location: ''
          skip_app_build: true
          production_branch: develop

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      AZURE_DEPLOY_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TEST }}
    steps:
      - name: Skip close when token is missing
        if: env.AZURE_DEPLOY_TOKEN == ''
        run: echo "::warning::AZURE_STATIC_WEB_APPS_API_TOKEN_TEST is not set. Skipping preview close."

      - name: Close Azure Static Web Apps preview environment
        if: env.AZURE_DEPLOY_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_DEPLOY_TOKEN }}
          action: close
          app_location: out
