name: Azure Static Web Apps Test

on:
  push:
    branches: [develop]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: azure-static-web-apps-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      SKIP_DEPLOY_ON_MISSING_SECRETS: true
      NEXT_PUBLIC_SITE_URL: ${{ vars.AZURE_TEST_SITE_URL }}
      NEXT_PUBLIC_GA_ID: ${{ vars.AZURE_TEST_GA_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Build static export for Azure
        run: npm run build:azure

      - name: Deploy test environment to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TEST }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: out
          output_location: ''
          skip_app_build: true
          production_branch: develop

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close Azure Static Web Apps preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TEST }}
          action: close
