name: Playwright E2E

on:
  push:
    branches: [develop]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'styles/**'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.js'
      - '.github/workflows/playwright.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'styles/**'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.js'
      - '.github/workflows/playwright.yml'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Selecione a suíte de testes E2E'
        required: true
        type: choice
        default: smoke
        options:
          - smoke
          - full

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run smoke suite (default)
        if: github.event_name != 'workflow_dispatch' || inputs.suite == 'smoke'
        run: npm run test:e2e:smoke

      - name: Run full suite (manual)
        if: github.event_name == 'workflow_dispatch' && inputs.suite == 'full'
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
