name: Playwright E2E

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Selecione a suíte de testes E2E'
        required: true
        type: choice
        default: smoke
        options:
          - smoke
          - full

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect E2E-relevant changes
        if: github.event_name != 'workflow_dispatch'
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            e2e:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'public/**'
              - 'styles/**'
              - 'tests/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.js'
              - 'instrumentation.ts'
              - 'instrumentation-client.ts'
              - 'sentry.server.config.ts'
              - 'sentry.edge.config.ts'
              - '.github/workflows/playwright.yml'

      - name: Skip E2E when no relevant files changed
        if: github.event_name != 'workflow_dispatch' && steps.changes.outputs.e2e != 'true'
        run: echo "No E2E-relevant files changed. Skipping Playwright run and reporting success."

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.e2e == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.e2e == 'true'
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.e2e == 'true'
        run: npx playwright install --with-deps

      - name: Run smoke suite (default)
        if: >
          (github.event_name == 'workflow_dispatch' && inputs.suite == 'smoke') ||
          (github.event_name != 'workflow_dispatch' && steps.changes.outputs.e2e == 'true')
        run: npm run test:e2e:smoke

      - name: Run full suite (manual)
        if: github.event_name == 'workflow_dispatch' && inputs.suite == 'full'
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: >
          always() &&
          (github.event_name == 'workflow_dispatch' || steps.changes.outputs.e2e == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
