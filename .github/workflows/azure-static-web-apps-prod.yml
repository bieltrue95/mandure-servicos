name: Azure Static Web Apps Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-static-web-apps-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars['AZURE_PROD_SITE_URL'] || '' }}
      NEXT_PUBLIC_GA_ID: ${{ vars['AZURE_PROD_GA_ID'] || '' }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ vars['AZURE_PROD_SENTRY_DSN'] || vars['NEXT_PUBLIC_SENTRY_DSN'] || '' }}
      SENTRY_ENVIRONMENT: production
      SENTRY_ORG: ${{ vars['SENTRY_ORG'] || 'gabriel-db' }}
      SENTRY_PROJECT: ${{ vars['SENTRY_PROJECT'] || 'mandure-servicos' }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      AZURE_DEPLOY_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build static export for Azure
        run: npm run build:azure

      - name: Skip deploy when token is missing
        if: env.AZURE_DEPLOY_TOKEN == ''
        run: echo "::warning::AZURE_STATIC_WEB_APPS_API_TOKEN_PROD is not set. Skipping deployment."

      - name: Deploy production environment to Azure Static Web Apps
        if: env.AZURE_DEPLOY_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: out
          output_location: ''
          skip_app_build: true
          production_branch: main
